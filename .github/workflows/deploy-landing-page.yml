name: Deploy Landing Page

on:
  push:
    branches:
      - main
    paths:
      - "landing-page/**"
      - ".github/workflows/deploy-landing-page.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "gh-pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy landing page to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: landing-page
          clean: true
          single-commit: true
